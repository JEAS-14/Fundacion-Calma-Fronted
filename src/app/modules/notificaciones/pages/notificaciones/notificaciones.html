<div class="notificaciones-container">

  <div class="header">

    <h2>
      Centro de Notificaciones
      <span class="contador">{{ cantidadNoLeidas }}</span>
    </h2>

    <button
      pButton
      label="Nueva Publicación"
      icon="pi pi-plus"
      class="p-button-sm">
    </button>

  </div>


  <div class="filtros">

    <button
      class="filtro"
      [class.activo]="filtroSeleccionado === 'todos'"
      (click)="cambiarFiltro('todos')">
      Todos
    </button>

    <button
      class="filtro"
      [class.activo]="filtroSeleccionado === 'comunicado'"
      (click)="cambiarFiltro('comunicado')">
      Comunicado
    </button>

    <button
      class="filtro"
      [class.activo]="filtroSeleccionado === 'alerta'"
      (click)="cambiarFiltro('alerta')">
      Alerta
    </button>

  </div>


  <div class="lista-notificaciones">

    <div
      class="card"
      *ngFor="let n of notificacionesFiltradas"
      [class.leido]="n.leido"
    >

      <div class="icono">

        <span *ngIf="n.tipo === 'comunicado'">📢</span>
        <span *ngIf="n.tipo === 'alerta'">⚠️</span>

      </div>


      <div class="contenido">

        <h4>{{ n.titulo }}</h4>

        <p>{{ n.mensaje }}</p>

        <span class="fecha">{{ n.fecha }}</span>

      </div>


      <button
        class="btn-leido"
        (click)="toggleLeido(n)">

        {{ n.leido ? 'Desmarcar' : 'Marcar leído' }}

      </button>

    </div>

  </div>

</div>
