<!-- HEADER GLOBAL -->
<header class="header">

  <!-- BUSCADOR -->
  <div class="search-bar">
    <i class="pi pi-search"></i>
    <input type="text" placeholder="Buscar Recursos, reportes o personal..." />
  </div>

  <!-- AREA DERECHA -->
  <div class="header-right">

    <!-- MODO OSCURO -->
    <button class="theme-toggle" (click)="toggleDarkMode()"
      [attr.aria-label]="isDarkMode() ? 'Modo Claro' : 'Modo Oscuro'">
      <i class="pi" [class.pi-sun]="isDarkMode()" [class.pi-moon]="!isDarkMode()"></i>
    </button>

    <!-- NOTIFICACIONES -->
    <i class="pi pi-bell notification"></i>

    <!-- USUARIO -->
    <div class="user-info">

      <div class="user-text">
        <strong>{{ nombreUsuario() }}</strong>
        <span>{{ rolUsuario() }}</span>
      </div>

      <div class="avatar">
        {{ inicialesUsuario() }}
      </div>

    </div>

  </div>

</header>
